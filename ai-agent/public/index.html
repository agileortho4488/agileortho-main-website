<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agile Healthcare - Demo</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .hero {
            text-align: center;
            max-width: 600px;
        }
        h1 {
            color: #1e293b;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        p {
            color: #64748b;
            font-size: 1.125rem;
            line-height: 1.6;
        }
    </style>

    <!-- Chat Widget CSS & JS -->
    <link rel="stylesheet" href="widget.css">
</head>
<body>

    <div class="hero">
        <h1>Welcome to Agile Ortho</h1>
        <p>Premium orthopedic mobility solutions tailored for your healthcare needs. Try interacting with our AI assistant in the bottom right corner.</p>
    </div>

    <!-- The widget container -->
    <div id="agile-ai-widget"></div>

    <script src="widget.js"></script>
    <script>
        // Initialize Widget
        AgileWidget.init({
            apiUrl: 'http://localhost:8000/chat',
            themeColor: '#2563eb'
        });
    </script>
</body>
</html>
